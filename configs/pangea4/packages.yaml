packages:
  all:
    compiler: [gcc@13.2.0]
    variants: cuda_arch=90
    target: [zen4]
    providers:
      mpi: [cray-mpich]
      blas: [openblas]
      lapack: [openblas]
  mpi:
    require: "cray-mpich@8.1.27"
  cray-mpich:
    require: "@8.1.27"
    buildable: false
    externals:
      - spec: "cray-mpich@8.1.27"
        prefix: /opt/cray/pe/mpich/8.1.27/ofi/gnu/10.3
        modules:
          - libfabric/1.13.1
  blas:
    require: "openblas"
  lapack:
    require: "openblas"
  slurm:
    require: "@=23.02.7"
    buildable: False
    externals:
    - spec: slurm@23.02.7
      prefix: /usr
  nalu-wind:
    require: +trilinos-solvers
  hdf5:
    # No Fortran bindings: AMR-Wind uses HDF5 via the C API only. The Fortran
    # bindings would compile USE mpi against cray-mpich's gfortran-10.3 mpi.mod,
    # which gfortran-13.2.0 can't read. hdf5+mpi C interface uses mpi.h (ABI-safe).
    variants: ~fortran
  amr-wind:
    variants: +tiny_profile +openfast +netcdf
  openfast:
    variants: +openmp +shared +rosco +fastfarm +netcdf

